name: tic_tac_toe
description: A Tic Tac Toe game with Firebase
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI এবং ইউটিলিটি
  provider: ^6.0.5
  intl: ^0.18.1
  
  # Firebase
  firebase_core: ^2.24.2
  cloud_firestore: ^4.14.0
  
  # কানেক্টিভিটি চেক করার জন্য (অপশনাল)
  connectivity_plus: ^5.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true